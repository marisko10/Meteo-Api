<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meteo App 🌤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">

   
    <header class="header">
      <span class="logo-icon">🌤️</span>
      <h1 class="logo-text">Meteo App</h1>
    </header>


    <div class="search-box">
      <input
        id="cityInput"
        type="text"
        placeholder="Pesquisar cidade... (ex: Lisbon)"
      
      />
      <button id="searchBtn">Pesquisar</button>
    </div>

  
    <div id="result" class="result-area">
      <p class="hint-text"> Escreve o nome de uma cidade para ver o tempo atual.</p>
    </div>

  
    <footer class="footer">
      <p>Dados por <a href="https://www.weatherapi.com">WeatherAPI</a> </p> 
      <p> By Pedro Freitas</p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
